<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="192" height="192">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a0f0a"/>
  <!-- Subtle inner glow border -->
  <rect x="5" y="5" width="502" height="502" rx="75" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.18"/>

  <!-- Cylinder body fill -->
  <rect x="124" y="178" width="264" height="140" fill="#0d1a0d"/>

  <!-- Cylinder left/right sides -->
  <line x1="124" y1="178" x2="124" y2="318" stroke="#00ff41" stroke-width="5" filter="url(#softglow)"/>
  <line x1="388" y1="178" x2="388" y2="318" stroke="#00ff41" stroke-width="5" filter="url(#softglow)"/>

  <!-- Top ellipse cap -->
  <ellipse cx="256" cy="178" rx="132" ry="38" fill="#0d1a0d" stroke="#00ff41" stroke-width="5" filter="url(#softglow)"/>

  <!-- Inner data rings (suggests stored rows) -->
  <ellipse cx="256" cy="218" rx="132" ry="38" fill="none" stroke="#00cc33" stroke-width="2.5" opacity="0.65"/>
  <ellipse cx="256" cy="258" rx="132" ry="38" fill="none" stroke="#00cc33" stroke-width="2.5" opacity="0.40"/>

  <!-- Bottom ellipse cap -->
  <ellipse cx="256" cy="318" rx="132" ry="38" fill="#0d1a0d" stroke="#00ff41" stroke-width="5" filter="url(#softglow)"/>

  <!-- SQL text -->
  <text
    x="256" y="430"
    font-family="'Courier New', Courier, monospace"
    font-size="88"
    font-weight="700"
    fill="#00ff41"
    text-anchor="middle"
    letter-spacing="8"
    filter="url(#glow)">SQL</text>
</svg>
