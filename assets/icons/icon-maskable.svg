<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Maskable icon: background fills all 512x512.
    Content is scaled to ~78% so it stays within the safe zone
    (the central 80% circle — inner 410x410 for a 512px icon).
  -->
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background (no rounded corners for maskable) -->
  <rect width="512" height="512" fill="#0a0f0a"/>
  <!-- Subtle corner accent lines -->
  <rect x="0" y="0" width="512" height="512" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.10"/>

  <!-- Cylinder scaled to 78%, centered at (256, 236) -->
  <!-- Body fill -->
  <rect x="152" y="194" width="208" height="108" fill="#0d1a0d"/>

  <!-- Sides -->
  <line x1="152" y1="194" x2="152" y2="302" stroke="#00ff41" stroke-width="4" filter="url(#softglow)"/>
  <line x1="360" y1="194" x2="360" y2="302" stroke="#00ff41" stroke-width="4" filter="url(#softglow)"/>

  <!-- Top ellipse -->
  <ellipse cx="256" cy="194" rx="104" ry="30" fill="#0d1a0d" stroke="#00ff41" stroke-width="4" filter="url(#softglow)"/>

  <!-- Inner data rings -->
  <ellipse cx="256" cy="226" rx="104" ry="30" fill="none" stroke="#00cc33" stroke-width="2" opacity="0.65"/>
  <ellipse cx="256" cy="258" rx="104" ry="30" fill="none" stroke="#00cc33" stroke-width="2" opacity="0.40"/>

  <!-- Bottom ellipse -->
  <ellipse cx="256" cy="302" rx="104" ry="30" fill="#0d1a0d" stroke="#00ff41" stroke-width="4" filter="url(#softglow)"/>

  <!-- SQL text -->
  <text
    x="256" y="398"
    font-family="'Courier New', Courier, monospace"
    font-size="70"
    font-weight="700"
    fill="#00ff41"
    text-anchor="middle"
    letter-spacing="6"
    filter="url(#glow)">SQL</text>
</svg>
